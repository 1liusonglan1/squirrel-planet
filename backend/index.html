<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后端服务 - 松鼠星球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --orange-primary: #FF8C00;
            --orange-light: #FFA500;
            --orange-dark: #FF6B00;
            --bg-dark: #0D1117;
            --bg-card: #161B22;
            --text-light: #F0F6FC;
            --text-dim: #8B949E;
            --code-green: #00FF9D;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .backend-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 50px 40px;
            border: 1px solid rgba(255, 140, 0, 0.2);
            box-shadow: 0 20px 60px rgba(255, 140, 0, 0.2);
        }

        .backend-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--orange-dark), var(--orange-light), var(--orange-dark));
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: block;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--orange-light), var(--orange-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-item {
            background: rgba(255, 140, 0, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .info-item h3 {
            color: var(--orange-primary);
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .info-item p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 50px;
            color: var(--code-green);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: var(--code-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .endpoints {
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 25px;
            text-align: left;
        }

        .endpoints h2 {
            color: var(--orange-light);
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .endpoint {
            margin-bottom: 12px;
            padding: 10px 15px;
            background: rgba(255, 140, 0, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .endpoint:last-child {
            margin-bottom: 0;
        }

        .method {
            background: var(--orange-primary);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .path {
            color: var(--text-light);
            font-family: 'Courier New', monospace;
        }

        .footer {
            margin-top: 30px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="backend-card">
            <h1>后端服务</h1>
            <p class="subtitle">松鼠星球后端 API 服务</p>

            <div class="status">
                <span class="status-dot"></span>
                服务运行中
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <h3>服务器</h3>
                    <p>InfinityFree</p>
                </div>
                <div class="info-item">
                    <h3>技术栈</h3>
                    <p>PHP + MySQL</p>
                </div>
                <div class="info-item">
                    <h3>版本</h3>
                    <p>v1.0.0</p>
                </div>
            </div>

            <div class="endpoints">
                <h2>API 端点</h2>
                <div class="endpoint">
                    <span class="method">POST</span>
                    <span class="path">/auth.php</span>
                </div>
                <div class="endpoint">
                    <span class="method">POST</span>
                    <span class="path">/password_reset.php</span>
                </div>
                <div class="endpoint">
                    <span class="method">GET</span>
                    <span class="path">/test_db.php</span>
                </div>
            </div>

            <p class="footer">
                © <script>document.write(new Date().getFullYear())</script> 松鼠星球 | 用代码编织梦想
            </p>
        </div>
    </div>
</body>
</html>
