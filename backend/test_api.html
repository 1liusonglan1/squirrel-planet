<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试API - 松鼠星球</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .result { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; white-space: pre-wrap; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>API 测试</h1>
    
    <h2>1. GET 测试 (ping)</h2>
    <button onclick="testGet()">测试 GET</button>
    <div id="getResult" class="result"></div>
    
    <h2>2. POST 测试 (send_verification)</h2>
    <input type="email" id="testEmail" placeholder="输入邮箱" value="test@example.com">
    <button onclick="testPost()">测试 POST</button>
    <div id="postResult" class="result"></div>
    
    <script>
        const API_URL = '/auth.php';
        
        async function testGet() {
            const resultDiv = document.getElementById('getResult');
            resultDiv.textContent = '测试中...';
            
            try {
                const response = await fetch(API_URL + '?ping=1');
                const data = await response.json();
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '错误: ' + error.message;
            }
        }
        
        async function testPost() {
            const email = document.getElementById('testEmail').value;
            const resultDiv = document.getElementById('postResult');
            resultDiv.textContent = '测试中...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'send_verification', email: email })
                });
                const data = await response.json();
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '错误: ' + error.message;
            }
        }
    </script>
</body>
</html>
